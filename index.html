<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daddy-Long-Legs — Letter Analysis</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8f7f4;--surface:#fff;--border:#e4e2dc;--border-strong:#c8c5bc;--text:#1a1917;--text-secondary:#6b6860;--text-hint:#9b988f;--blue-bg:#eef4ff;--blue-text:#2b5bbf;--blue-border:#b8ccf5;--amber-bg:#fff8ec;--amber-text:#8a5a00;--amber-border:#f0d090;--green-bg:#edf7f0;--green-text:#1a6b38;--green-border:#a8d9b8;--radius:10px;--radius-sm:6px}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.wrap{max-width:740px;margin:0 auto;padding:1.5rem 1.25rem 3rem}
.unit-label{font-size:11px;font-weight:600;color:var(--text-hint);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.quiz-title{font-size:20px;font-weight:700;color:var(--text)}
.quiz-meta{font-size:13px;color:var(--text-secondary);margin-top:3px;margin-bottom:1.25rem}
.prog-wrap{height:4px;background:var(--border);border-radius:99px;margin:1rem 0 1.5rem;overflow:hidden}
.prog-fill{height:100%;background:#2b5bbf;border-radius:99px;transition:width .4s ease;width:0%}
.reading-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.125rem 1.25rem;margin-bottom:1.25rem}
.reading-label{font-size:11px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.reading-body{font-size:14.5px;line-height:1.8;color:var(--text);white-space:pre-wrap;font-family:Georgia,'Times New Roman',serif}
.qcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.125rem 1.25rem;margin-bottom:.75rem;transition:border-color .2s}
.qcard.answered{border-color:#a8d9b8}
.q-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px}
.q-num{flex-shrink:0;width:24px;height:24px;background:var(--blue-bg);color:var(--blue-text);border-radius:50%;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px}
.q-eng{font-size:15px;font-weight:600;color:var(--text);line-height:1.45}
.q-kor{font-size:13px;color:var(--text-secondary);margin:4px 0 0 34px;line-height:1.5}
.q-pill{display:inline-block;font-size:11px;font-weight:600;color:var(--blue-text);background:var(--blue-bg);border:1px solid var(--blue-border);border-radius:99px;padding:2px 9px;margin:8px 0 10px 34px}
.ans-area{width:100%;border:1px solid var(--border-strong);border-radius:var(--radius-sm);padding:9px 12px;font-size:14px;font-family:inherit;color:var(--text);background:var(--bg);resize:none;min-height:80px;outline:none;line-height:1.6;transition:border-color .15s}
.ans-area:focus{border-color:#7aaaf0;background:#fff}
.btn-row{display:flex;gap:8px;margin-top:10px}
.btn-hint{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;font-size:13px;font-weight:500;border:1px solid var(--border-strong);border-radius:var(--radius-sm);background:var(--surface);color:var(--text-secondary);cursor:pointer;transition:background .12s,border-color .12s}
.btn-hint:hover{background:var(--amber-bg);border-color:var(--amber-border);color:var(--amber-text)}
.btn-check{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;font-size:13px;font-weight:600;border:none;border-radius:var(--radius-sm);background:#2b5bbf;color:#fff;cursor:pointer;transition:background .12s,transform .1s}
.btn-check:hover{background:#1e4aa0}
.btn-check:active{transform:scale(.97)}
.fb{margin-top:10px;padding:10px 12px;border-radius:var(--radius-sm);font-size:13px;line-height:1.65;display:none;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.fb-h{background:var(--amber-bg);color:var(--amber-text);border:1px solid var(--amber-border)}
.fb-a{background:var(--green-bg);color:var(--green-text);border:1px solid var(--green-border)}
.fb-a strong{font-weight:700;display:block;margin-bottom:3px}
.footer{display:flex;align-items:center;justify-content:space-between;margin-top:1.5rem;flex-wrap:wrap;gap:8px}
.prog-label{font-size:13px;color:var(--text-secondary)}
.icon{width:15px;height:15px;display:inline-block;vertical-align:-2px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>
<div class="wrap">
  <div class="unit-label">MYP Language Acquisition &middot; Criterion A</div>
  <div class="quiz-title" id="qtitle"></div>
  <div class="quiz-meta" id="qmeta"></div>
  <div class="prog-wrap"><div class="prog-fill" id="pf"></div></div>
  <div class="reading-card">
    <div class="reading-label">📄 Reading text</div>
    <div class="reading-body" id="rbody"></div>
  </div>
  <div id="qlist"></div>
  <div class="footer">
    <span class="prog-label" id="pl">0 / 0 answered</span>
  </div>
</div>
<script>
var TITLE="Daddy-Long-Legs — Letter Analysis";
var TEXT=`215 Fergussen Hall, September 24th.

Dear Kind-Trustee-Who-Sends-Orphans-to-College,

Here I am! I traveled yesterday for four hours in a train. It's a funny sensation, isn't it? I never rode in one before.

College is the biggest, most bewildering place — I get lost whenever I leave my room. I will write you a description later when I'm feeling less muddled; also I will tell you about my lessons. Classes don't begin until Monday morning, and this is Saturday night. But I wanted to write a letter first just to get acquainted.

It seems queer to be writing letters to somebody you don't know. It seems queer for me to be writing letters at all — I've never written more than three or four in my life, so please overlook it if these are not a model kind.

Before leaving yesterday morning, Mrs. Lippett and I had a very serious talk. She told me how to behave all the rest of my life, and especially how to behave toward the kind gentleman who is doing so much for me. I must take care to be Very Respectful.

But how can one be very respectful to a person who wishes to be called John Smith? Why couldn't you have picked out a name with a little personality? I might as well write letters to Dear Hitching-Post or Dear Clothes-Pole.

I have been thinking about you a great deal this summer; having somebody take an interest in me after all these years, makes me feel as though I had found a sort of family. It seems as though I belonged to somebody now, and it's a very comfortable sensation. I must say, however, that when I think about you, my imagination has very little to work upon. There are just three things that I know:

I. You are tall.
II. You are rich.
III. You hate girls.

I suppose I might call you Dear Mr. Girl-Hater. Only that's sort of insulting to me. Or Dear Mr. Rich-Man, but that's insulting to you, as though money were the only important thing about you. Besides, being rich is such a very external quality. Maybe you won't stay rich all your life; lots of very clever men get smashed up in Wall Street. But at least you will stay tall all your life!

So I've decided to call you Dear Daddy-Long-Legs. I hope you won't mind. It's just a private pet name — we won't tell Mrs. Lippett.

The ten o'clock bell is going to ring in two minutes. Our day is divided into sections by bells. We eat and sleep and study by bells. It's very enlivening; I feel like a fire horse all of the time. There it goes! Lights out. Good night.

Observe with what precision I obey rules — due to my training in the John Grier Home.

Yours most respectfully,
Jerusha Abbott`;
var QS=[{"eng":"Who is writing this letter, and who is it written to?","kor":"이 편지를 쓴 사람은 누구이고, 받는 사람은 누구인가요?","crit":"Criterion A — i","hint":"Look at the greeting at the top and the sign-off at the bottom of the letter.","ans":"The letter is written by Jerusha Abbott, a girl who has just arrived at college. It is addressed to the trustee who is paying for her education, whom she does not know personally."},{"eng":"Why does Jerusha decide to call her trustee 'Daddy-Long-Legs'?","kor":"제루샤는 왜 후원자를 'Daddy-Long-Legs'라고 부르기로 했나요?","crit":"Criterion A — ii","hint":"Think about what she knows about him and why the other names she considered did not work.","ans":"She knows three things about him: he is tall, rich, and dislikes girls. Other names felt insulting — 'Mr. Girl-Hater' insulted her and 'Mr. Rich-Man' reduced him to his wealth. 'Daddy-Long-Legs' refers to his height, the one quality that will never change, and feels personal without being offensive."},{"eng":"What can you infer about Jerusha's background from her description of the train journey?","kor":"기차 여행 묘사에서 제루샤의 배경에 대해 무엇을 추론할 수 있나요?","crit":"Criterion A — iii","hint":"Pay attention to what she says about riding a train for the first time, and what that suggests about where she grew up.","ans":"Jerusha says she had never ridden a train before, suggesting she grew up in poverty or in an isolated institution. This is supported by her mention of the John Grier Home, which is an orphanage, confirming she had a very limited experience of the outside world."},{"eng":"How does Jerusha's tone shift throughout the letter? Give two examples.","kor":"편지 전체에서 제루샤의 어조는 어떻게 변화하나요? 두 가지 예를 드세요.","crit":"Criterion A — iv","hint":"Compare the beginning of the letter (excitement, nervousness) with the more thoughtful passages about belonging and family.","ans":"At the start, Jerusha is excited and a little overwhelmed, using exclamation marks and informal expressions like 'bewildering.' Later, she becomes more reflective and emotionally sincere when she writes about feeling like she now belongs to somebody. This shift shows she is both playful and deeply grateful."},{"eng":"What is the purpose of this letter? Use evidence from the text to support your answer.","kor":"이 편지의 목적은 무엇인가요? 텍스트에서 근거를 찾아 답하세요.","crit":"Criterion A — i, iv","hint":"Look at the very first paragraph — she says she wanted to write 'just to get acquainted.' What does this suggest about her purpose?","ans":"The main purpose is to introduce herself and begin building a connection with a stranger who is helping her. She admits she wrote not to report on her studies but 'just to get acquainted.' The informal, conversational tone and her creative nicknaming suggest she is trying to establish a warm, personal relationship despite not knowing him at all."}];
var checked=new Set();
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
document.getElementById('qtitle').textContent=TITLE;
document.getElementById('qmeta').textContent=QS.length+' question'+(QS.length>1?'s':'');
document.getElementById('rbody').textContent=TEXT;
var tot=QS.length;
function upd(){var d=checked.size;document.getElementById('pl').textContent=d+' / '+tot+' answered';document.getElementById('pf').style.width=(tot>0?d/tot*100:0)+'%';}
upd();
var ul=document.getElementById('qlist');
QS.forEach(function(q,i){
  var c=document.createElement('div');c.className='qcard';c.id='c'+i;
  c.innerHTML='<div class="q-header"><div class="q-num">'+(i+1)+'</div><div class="q-eng">'+esc(q.eng)+'</div></div>'
    +(q.kor?'<div class="q-kor">'+esc(q.kor)+'</div>':'')
    +'<div class="q-pill">'+esc(q.crit)+'</div>'
    +'<textarea class="ans-area" id="sa'+i+'" rows="3" placeholder="Write your answer here… / 여기에 답변을 작성하세요"></textarea>'
    +'<div class="btn-row">'
    +(q.hint?'<button class="btn-hint" onclick="th('+i+')"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg> 힌트 보기</button>':'')
    +'<button class="btn-check" onclick="ca('+i+')"><svg class="icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> 답변 확인</button></div>'
    +(q.hint?'<div class="fb fb-h" id="h'+i+'">'+esc(q.hint)+'</div>':'')
    +(q.ans?'<div class="fb fb-a" id="a'+i+'"><strong>✅ Model answer</strong>'+esc(q.ans)+'</div>':'');
  ul.appendChild(c);
});
function th(i){var h=document.getElementById('h'+i);if(!h)return;var a=document.getElementById('a'+i);var show=h.style.display==='block';h.style.display=show?'none':'block';if(a)a.style.display='none';}
function ca(i){var sa=document.getElementById('sa'+i);if(!sa.value.trim()){sa.focus();return;}var h=document.getElementById('h'+i);var a=document.getElementById('a'+i);if(h)h.style.display='none';if(a)a.style.display='block';document.getElementById('c'+i).classList.add('answered');if(!checked.has(i)){checked.add(i);upd();}}
</script>
</body>
</html>
