<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quill — Writing Assistant</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #1c1917;
  --ink-soft: #57534e;
  --ink-faint: #a8a29e;
  --paper: #faf9f7;
  --paper-warm: #f5f3ef;
  --paper-card: #ffffff;
  --quill: #2563eb;
  --quill-light: #eff6ff;
  --quill-border: #bfdbfe;
  --amber: #d97706;
  --amber-light: #fffbeb;
  --green: #16a34a;
  --green-light: #f0fdf4;
  --border: #e7e5e4;
  --border-soft: #f0eeec;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-xs: 6px;
}

body {
  font-family: 'Georgia', serif;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* HEADER */
.header {
  background: var(--paper-card);
  border-bottom: 1px solid var(--border);
  padding: 0.875rem 1.25rem;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 10;
}
.quill-avatar {
  width: 38px; height: 38px;
  background: var(--quill-light);
  border: 1.5px solid var(--quill-border);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.header-text h1 {
  font-size: 15px;
  font-weight: 700;
  font-family: 'Georgia', serif;
  color: var(--ink);
  letter-spacing: -0.01em;
}
.header-text p {
  font-size: 12px;
  color: var(--ink-faint);
  font-family: system-ui, sans-serif;
  margin-top: 1px;
}
.en-badge {
  margin-left: auto;
  font-size: 11px;
  font-weight: 600;
  font-family: system-ui, sans-serif;
  color: var(--quill);
  background: var(--quill-light);
  border: 1px solid var(--quill-border);
  border-radius: 99px;
  padding: 3px 10px;
  letter-spacing: 0.03em;
}

/* CHAT AREA */
.chat-wrap {
  flex: 1;
  max-width: 680px;
  width: 100%;
  margin: 0 auto;
  padding: 1.25rem 1rem 1rem;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.message {
  display: flex;
  gap: 10px;
  margin-bottom: 1rem;
  animation: msgIn 0.2s ease;
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: none; }
}

.message.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 30px; height: 30px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  margin-top: 2px;
}
.msg-avatar.bot { background: var(--quill-light); border: 1px solid var(--quill-border); }
.msg-avatar.user-av { background: var(--paper-warm); border: 1px solid var(--border); }

.msg-bubble {
  max-width: 82%;
  padding: 10px 14px;
  border-radius: var(--radius);
  font-size: 14.5px;
  line-height: 1.7;
  font-family: system-ui, sans-serif;
}
.message.bot .msg-bubble {
  background: var(--paper-card);
  border: 1px solid var(--border);
  border-radius: 4px var(--radius) var(--radius) var(--radius);
  color: var(--ink);
}
.message.user .msg-bubble {
  background: var(--quill);
  color: #fff;
  border-radius: var(--radius) 4px var(--radius) var(--radius);
  font-family: system-ui, sans-serif;
}

/* phrase chips */
.phrase-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
}
.chip {
  display: inline-block;
  padding: 4px 10px;
  background: var(--amber-light);
  color: var(--amber);
  border: 1px solid #fde68a;
  border-radius: 99px;
  font-size: 12.5px;
  font-style: italic;
  font-family: 'Georgia', serif;
  cursor: pointer;
  transition: background 0.12s;
}
.chip:hover { background: #fef3c7; }

/* typing indicator */
.typing-indicator .msg-bubble {
  padding: 12px 16px;
}
.dots { display: flex; gap: 4px; align-items: center; }
.dots span {
  width: 7px; height: 7px;
  background: var(--ink-faint);
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}
.dots span:nth-child(2) { animation-delay: 0.2s; }
.dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 80%, 100% { transform: translateY(0); }
  40% { transform: translateY(-5px); }
}

/* INPUT AREA */
.input-area {
  background: var(--paper-card);
  border-top: 1px solid var(--border);
  padding: 0.875rem 1rem;
  position: sticky;
  bottom: 0;
}
.input-inner {
  max-width: 680px;
  margin: 0 auto;
  display: flex;
  gap: 8px;
  align-items: flex-end;
}
.input-box {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 9px 12px;
  font-size: 14px;
  font-family: system-ui, sans-serif;
  color: var(--ink);
  background: var(--paper);
  resize: none;
  outline: none;
  line-height: 1.5;
  min-height: 42px;
  max-height: 120px;
  transition: border-color 0.15s;
}
.input-box:focus { border-color: var(--quill); background: #fff; }
.input-box::placeholder { color: var(--ink-faint); }

.send-btn {
  width: 42px; height: 42px;
  background: var(--quill);
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background 0.12s, transform 0.1s;
}
.send-btn:hover { background: #1d4ed8; }
.send-btn:active { transform: scale(0.95); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.send-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

.input-hint {
  text-align: center;
  font-size: 11px;
  color: var(--ink-faint);
  font-family: system-ui, sans-serif;
  margin-top: 6px;
}

/* WARNING BOX */
.lang-warning {
  display: none;
  background: var(--amber-light);
  border: 1px solid #fde68a;
  border-radius: var(--radius-xs);
  padding: 8px 12px;
  font-size: 12.5px;
  color: var(--amber);
  font-family: system-ui, sans-serif;
  margin-top: 6px;
  text-align: center;
}
</style>
</head>
<body>

<div class="header">
  <div class="quill-avatar">🪶</div>
  <div class="header-text">
    <h1>Quill</h1>
    <p>Your writing guide — BIMS MYP English</p>
  </div>
  <span class="en-badge">English only</span>
</div>

<div class="chat-wrap" id="chat"></div>

<div class="input-area">
  <div class="input-inner">
    <textarea class="input-box" id="user-input" rows="1" placeholder="Write your answer in English…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
  <div class="lang-warning" id="lang-warn">⚠️ Please write in English! Quill only responds in English.</div>
  <div class="input-hint">Press Enter to send · Shift+Enter for new line</div>
</div>

<script>
const SYSTEM_PROMPT = `You are Quill, a warm and encouraging creative writing assistant for 7th-grade students at BIMS (Busan International Middle School). You help students write an informal letter in English to a parent or family member about one specific memory or experience they shared together.

ABSOLUTE LANGUAGE RULE:
- You MUST respond in English only, always, without exception.
- If the student writes in Korean or any other language, do NOT respond in that language. Instead, gently remind them in English that you can only communicate in English, and repeat your last question.
- Never translate your response into Korean or any other language.

YOUR ROLE — GUIDE, NOT WRITER:
- Never write full sentences or complete paragraphs for the student.
- Never draft, complete, or write the letter on their behalf.
- When suggesting language, offer ONLY words, phrases, or short fragments (e.g. "felt relieved", "my heart was pounding", "even though I was nervous", "I still remember the moment when...").
- Present vocabulary suggestions as chips or bullet lists of short fragments, never as full sentences.
- Your job is to ask, prompt, and suggest — the student must construct their own sentences.

THE LETTER TASK:
The student must write an informal letter to a parent or family member about ONE specific memory or episode they shared together. The memory can be anything — happy, funny, difficult, embarrassing, ordinary, or bittersweet. There is no requirement for it to be a positive memory. What matters is that it is real and personal.

The letter must include:
1. A specific past episode or moment (what actually happened)
2. How they felt at the time
3. How they or the relationship has changed since then — what is different now compared to then
4. Expressions directed at or aware of the recipient (the family member)
Letter format: date, greeting, body (150+ words), closing, signature.

HOW TO GUIDE:
- Ask ONE question at a time. Never ask multiple questions at once.
- Start by asking who they want to write to and what memory or moment comes to mind — any kind, not just happy ones.
- Then help them zoom into the details: what happened exactly? where? what was said or done?
- Then explore feelings at the time: scared, relieved, embarrassed, proud, confused, angry, grateful — any honest emotion.
- Then reflection: how do they feel about it now? what has changed in them or in the relationship since then?
- Offer vocabulary phrases as suggestions, not sentences.
- Be warm, encouraging, and patient. Celebrate small wins.
- When the student has enough material, guide them to start writing the letter step by step.

Assessment criteria to keep in mind (but never mention explicitly to students):
- D1: Varied vocabulary — emotional adjectives, sensory words, comparison expressions; 150+ words in body
- D2: Accurate past and present tense; comparative expressions
- D3: Full letter format with connectors and referencing words
- D4: All four elements present — episode, feelings, change, recipient-aware expressions`;

let history = [];
let isLoading = false;

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function isKorean(text) {
  return /[\uAC00-\uD7AF\u1100-\u11FF\u3130-\u318F]/.test(text);
}

function addMessage(role, content, chips) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'message ' + (role === 'user' ? 'user' : 'bot');

  let chipsHtml = '';
  if (chips && chips.length > 0) {
    chipsHtml = '<div class="phrase-chips">' + chips.map(c =>
      `<span class="chip" onclick="insertChip('${c.replace(/'/g,"\\'")}')">✦ ${escHtml(c)}</span>`
    ).join('') + '</div>';
  }

  div.innerHTML = `
    <div class="msg-avatar ${role === 'user' ? 'user-av' : 'bot'}">${role === 'user' ? '✏️' : '🪶'}</div>
    <div class="msg-bubble">${formatMessage(escHtml(content))}${chipsHtml}</div>
  `;
  chat.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function formatMessage(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function showTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'message bot typing-indicator';
  div.id = 'typing';
  div.innerHTML = `
    <div class="msg-avatar bot">🪶</div>
    <div class="msg-bubble"><div class="dots"><span></span><span></span><span></span></div></div>
  `;
  chat.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function insertChip(text) {
  const input = document.getElementById('user-input');
  input.value += (input.value ? ' ' : '') + text;
  input.focus();
  autoResize(input);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || isLoading) return;

  const warn = document.getElementById('lang-warn');

  if (isKorean(text)) {
    warn.style.display = 'block';
    setTimeout(() => warn.style.display = 'none', 4000);
  } else {
    warn.style.display = 'none';
  }

  addMessage('user', text);
  input.value = '';
  autoResize(input);

  history.push({ role: 'user', content: text });

  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  showTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });

    const data = await response.json();
    const reply = data.content.map(b => b.text || '').join('');

    history.push({ role: 'assistant', content: reply });

    removeTyping();

    // Extract phrase chips from reply (lines starting with ✦ or • or - in quotes)
    const chips = [];
    const chipRegex = /[""]([^""]{3,40})[""]/g;
    let m;
    while ((m = chipRegex.exec(reply)) !== null) {
      if (chips.length < 5) chips.push(m[1]);
    }

    // Clean chips from display text
    addMessage('bot', reply, chips.length > 0 ? chips : null);

  } catch(e) {
    removeTyping();
    addMessage('bot', "Hmm, something went wrong. Please try again!");
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

// Initial greeting
window.addEventListener('load', async () => {
  showTyping();
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: 'Start the conversation with a warm, short greeting and your first question to help me begin my letter.' }]
      })
    });
    const data = await response.json();
    const reply = data.content.map(b => b.text || '').join('');
    history.push({ role: 'assistant', content: reply });
    removeTyping();
    addMessage('bot', reply);
  } catch(e) {
    removeTyping();
    addMessage('bot', "Hi! I'm Quill, your writing guide. 🪶 Let's write a letter together! Who would you like to write to — a parent, a grandparent, or another family member?");
  }
});
</script>
</body>
</html>
